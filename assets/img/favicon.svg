<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A9CC" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#1d5a75" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <!-- Base oscura para que resalte en pestañas claras y oscuras -->
  <rect width="512" height="512" rx="128" fill="#061219" />
  <!-- Gradiente y Borde -->
  <rect width="512" height="512" rx="128" fill="url(#bgGradient)" stroke="#287799" stroke-width="24"/>
  <!-- Letra C -->
  <text x="256" y="375" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#00D8FF" text-anchor="middle">C</text>
</svg>
